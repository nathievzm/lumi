pre-commit:
  jobs:
    - name: format
      run: bun fmt && git add .

    - name: lint
      run: bun lint

    - name: types
      run: bunx --bun tsc --noEmit

commit-msg:
  jobs:
    - name: commitlint
      run: bunx --bun commitlint --edit {1}

pre-push:
  jobs:
    - name: test-placeholder
      run: echo "ready to push! tests will go here in the future ✨"
