pre-commit:
  jobs:
    - name: format
      run: bun fmt {staged_files}
      stage_fixed: true

    - name: lint
      run: bun lint {staged_files}
      glob: '*.{js,ts}'

    - name: types
      run: bunx --bun tsc --noEmit {staged_files}
      glob: '*.{ts}'

commit-msg:
  jobs:
    - name: commitlint
      run: bunx --bun commitlint --edit {1}

pre-push:
  jobs:
    - name: test-placeholder
      run: echo "ready to push! tests will go here in the future ✨"
