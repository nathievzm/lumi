name: sync pull request metadata with issue

run-name: syncing ${{ github.base_ref }} pull request with the linked issue 🔄

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Run sync script
        run: bun .github/scripts/sync-pr-issue
        env:
          GITHUB_TOKEN: ${{ secrets.LUMI_SYNC_PR_ISSUE }}
